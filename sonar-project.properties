sonar.projectKey=Toomas633_MeshForge
sonar.organization=toomas633
sonar.projectName=MeshForge
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage/python/coverage.xml

# JavaScript / TypeScript
sonar.javascript.lcov.reportPaths=coverage/frontend/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# ESLint external report
sonar.eslint.reportPaths=reports/eslint-report.json

# External linter reports (Stylelint, Hadolint) — generic issue format
sonar.externalIssuesReportPaths=reports/stylelint-sonar.json,reports/hadolint-sonar.json,reports/pylint-sonar.json,reports/htmlhint-sonar.json

# Exclusions
sonar.exclusions=static/**,jobs/**,node_modules/**
sonar.coverage.exclusions=tests/**,conftest.py
sonar.cpd.exclusions=tests/**