name: Publish Docker image

on:
  release:
    types: [published]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Set lowercase image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.image }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ needs.prepare.outputs.image }}:${{ github.sha }}-${{ matrix.suffix }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ needs.prepare.outputs.image }}:buildcache-${{ matrix.suffix }}
          cache-to: type=registry,ref=${{ needs.prepare.outputs.image }}:buildcache-${{ matrix.suffix }},mode=max

  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.image }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push multi-platform manifest
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          tag_args=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args="$tag_args --tag $tag"
          done <<< "$TAGS"
          docker buildx imagetools create \
            $tag_args \
            "$IMAGE:${{ github.sha }}-amd64" \
            "$IMAGE:${{ github.sha }}-arm64"
