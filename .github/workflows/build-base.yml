name: Publish base image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.base
  workflow_dispatch:

jobs:
  derive-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.value }}
      owner: ${{ steps.tag.outputs.owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Derive image tag from Dockerfile.base
        id: tag
        run: |
          OCCT=$(grep 'ARG OCCT_VERSION=' Dockerfile.base | head -1 | cut -d= -f2)
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "value=occt${OCCT}-py3.14" >> "$GITHUB_OUTPUT"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"

  build:
    needs: derive-tag
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ needs.derive-tag.outputs.owner }}/meshforge-base:${{ needs.derive-tag.outputs.tag }}-${{ matrix.suffix }}
          cache-from: type=registry,ref=ghcr.io/${{ needs.derive-tag.outputs.owner }}/meshforge-base:buildcache-${{ matrix.suffix }}
          cache-to: type=registry,ref=ghcr.io/${{ needs.derive-tag.outputs.owner }}/meshforge-base:buildcache-${{ matrix.suffix }},mode=max

  merge:
    needs: [derive-tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push multi-platform manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ needs.derive-tag.outputs.owner }}/meshforge-base:${{ needs.derive-tag.outputs.tag }} \
            --tag ghcr.io/${{ needs.derive-tag.outputs.owner }}/meshforge-base:latest \
            ghcr.io/${{ needs.derive-tag.outputs.owner }}/meshforge-base:${{ needs.derive-tag.outputs.tag }}-amd64 \
            ghcr.io/${{ needs.derive-tag.outputs.owner }}/meshforge-base:${{ needs.derive-tag.outputs.tag }}-arm64
