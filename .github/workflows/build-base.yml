name: Publish base image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.base
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag from Dockerfile.base
        id: tag
        run: |
          OCCT=$(grep 'ARG OCCT_VERSION=' Dockerfile.base | head -1 | cut -d= -f2)
          echo "value=occt${OCCT}-py3.14" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/meshforge-base:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/meshforge-base:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/meshforge-base:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/meshforge-base:buildcache,mode=max
